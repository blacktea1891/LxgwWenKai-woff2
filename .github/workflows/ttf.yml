name: Convert and Release LXGW WenKai Lite (Pure TTF)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  subset-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 1. 极简环境配置
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget jq
        python -m pip install --upgrade pip
        pip install fonttools

    - name: Create working directories
      run: mkdir -p fonts/original_ttf fonts/subset_ttf

    # 2. 动态获取最新版本号
    - name: Get latest release version
      id: get_version
      run: |
        API_URL="https://api.github.com/repos/lxgw/LxgwWenKai-Lite/releases/latest"
        RELEASE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" $API_URL)
        VERSION=$(echo "$RELEASE_INFO" | jq -r .tag_name)
        
        if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
          echo "Error: Failed to fetch the latest version."
          exit 1
        fi
        
        echo "WENKAI_LITE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Successfully fetched latest version: $VERSION"

    # 3. 下载原始 TTF
    - name: Download WenKai Lite TTF files
      run: |
        FONT_FILES=(
          "LXGWWenKaiLite-Regular.ttf"
          "LXGWWenKaiLite-Medium.ttf"
        )
        BASE_URL="https://github.com/lxgw/LxgwWenKai-Lite/releases/download/${{ env.WENKAI_LITE_VERSION }}"
        
        for FONT_FILE in "${FONT_FILES[@]}"; do
          wget -q --show-progress -O "fonts/original_ttf/$FONT_FILE" "$BASE_URL/$FONT_FILE"
        done

    # 4. 核心魔法：生成纯血 TTF + 剥离微调指令（极限瘦身）
    - name: Subset to Pure TTF
      run: |
        cd fonts/original_ttf
        for file in *.ttf; do
          if [ -f "$file" ] && [ -s "$file" ]; then
            echo "Subsetting $file to < 5MB Pure TTF..."
            
            # --no-hinting: 核心大招！去除冗余的屏幕渲染微调指令，大幅降低 TTF 体积
            # --name-IDs='*': 依然保留所有版权信息，满足 Java 校验
            pyftsubset "$file" \
              --unicodes="U+0000-00FF,U+2000-206F,U+3000-303F,U+4E00-9FA5,U+FF00-FFEF" \
              --name-IDs='*' \
              --no-hinting \
              --output-file="../subset_ttf/$file"
          fi
        done
        cd ../..

    # 5. 发布最终版 TTF
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: pure-ttf-wenkai-lite-${{ env.WENKAI_LITE_VERSION }}
        name: LXGW WenKai Lite Pure TTF (${{ env.WENKAI_LITE_VERSION }})
        body: |
          **Grimmory 专供版：纯血 TTF 格式**
          - **绝对过检**：放弃 WOFF2 格式，采用最基础的 `.ttf` 扩展名和底层结构，从根源上避开 Java 后端的 MIME 误判。
          - **极限瘦身**：使用 `--no-hinting` 剥离了无用的屏幕微调指令，结合子集化，确保 TTF 单文件体积被死死压制在 5MB 以内。
        artifacts: "fonts/subset_ttf/*.ttf"
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
