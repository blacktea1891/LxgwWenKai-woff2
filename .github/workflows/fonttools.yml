name: Convert and Release LXGW WenKai Lite Ultimate WOFF2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  subset-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 1. 只需要极速的 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget jq
        python -m pip install --upgrade pip
        # 必须安装 brotli，这是 fonttools 导出 WOFF2 的必要依赖
        pip install fonttools brotli

    - name: Create working directories
      run: mkdir -p fonts/original_ttf fonts/subset_woff2

    # 2. 动态获取最新版本号
    - name: Get latest release version
      id: get_version
      run: |
        API_URL="https://api.github.com/repos/lxgw/LxgwWenKai-Lite/releases/latest"
        RELEASE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" $API_URL)
        VERSION=$(echo "$RELEASE_INFO" | jq -r .tag_name)
        
        if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
          echo "Error: Failed to fetch the latest version."
          exit 1
        fi
        
        echo "WENKAI_LITE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Successfully fetched latest version: $VERSION"

    # 3. 下载原始 TTF
    - name: Download WenKai Lite TTF files
      run: |
        FONT_FILES=(
          "LXGWWenKaiLite-Regular.ttf"
          "LXGWWenKaiLite-Medium.ttf"
        )
        BASE_URL="https://github.com/lxgw/LxgwWenKai-Lite/releases/download/${{ env.WENKAI_LITE_VERSION }}"
        
        for FONT_FILE in "${FONT_FILES[@]}"; do
          wget -q --show-progress -O "fonts/original_ttf/$FONT_FILE" "$BASE_URL/$FONT_FILE"
        done

    # 4. 核心魔法：导出 WOFF2 的同时，强制保留所有内部身份信息！
    - name: Subset to WOFF2 with Meta-Data
      run: |
        cd fonts/original_ttf
        for file in *.ttf; do
          if [ -f "$file" ] && [ -s "$file" ]; then
            echo "Subsetting $file to WOFF2 (Keeping Name IDs)..."
            
            # --flavor=woff2: 直接输出 WOFF2 格式
            # --name-IDs='*': 你的神来之笔！保留所有内部信息，完美通过 Java MIME 校验！
            pyftsubset "$file" \
              --unicodes="U+0000-00FF,U+2000-206F,U+3000-303F,U+4E00-9FA5,U+FF00-FFEF" \
              --name-IDs='*' \
              --flavor=woff2 \
              --output-file="../subset_woff2/${file%.ttf}.woff2"
          fi
        done
        cd ../..

    # 5. 发布最终完美版 WOFF2
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ultimate-woff2-wenkai-lite-${{ env.WENKAI_LITE_VERSION }}
        name: LXGW WenKai Lite Ultimate WOFF2 (${{ env.WENKAI_LITE_VERSION }})
        body: |
          **Grimmory 专供终极版：WOFF2 极速加载 + 完美过检**
          - **完美过检**：虽然是 WOFF2 格式，但强制保留了完整的 `Name Tables` (版权、作者信息)，100% 通过 Grimmory 后端严苛的 Java MIME 嗅探。
          - **极限小巧**：结合了剔除生僻字的子集化 + Brotli 算法压缩，单文件预计仅 2MB-3MB。
        artifacts: "fonts/subset_woff2/*.woff2"
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
