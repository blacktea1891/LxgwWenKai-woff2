name: Convert and Release LXGW WenKai Lite to WOFF2

on:
  workflow_dispatch:

# 修复 403 权限问题
permissions:
  contents: write

jobs:
  convert-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 配置 Python 环境用于精准裁剪
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y wget
        python -m pip install --upgrade pip
        pip install fonttools brotli

    - name: Create fonts directory
      run: mkdir -p fonts/ttf fonts/woff2

    - name: Get latest release info from LXGW WenKai Lite
      id: lxgw_lite_release
      run: |
        API_URL="https://api.github.com/repos/lxgw/LxgwWenKai-Lite/releases/latest"
        # 加上 GitHub Token 验证，彻底告别 API 速率限制导致的空版本号问题
        RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $API_URL)
        VERSION=$(echo "$RELEASE_INFO" | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        
        # 增加一个容错机制：如果还是获取不到，直接使用默认版本号，保证脚本绝不中断
        if [ -z "$VERSION" ]; then VERSION="v1.522"; fi
        
        echo "WENKAI_LITE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Latest LXGW WenKai Lite version: $VERSION"

    - name: Download WenKai Lite TTF files
      run: |
        FONT_FILES=(
          "LXGWWenKaiLite-Regular.ttf"
          "LXGWWenKaiLite-Medium.ttf"
        )
        BASE_URL="https://github.com/lxgw/LxgwWenKai-Lite/releases/download/${{ env.WENKAI_LITE_VERSION }}"
        
        for FONT_FILE in "${FONT_FILES[@]}"; do
          echo "Downloading $FONT_FILE"
          wget -q --show-progress -O "fonts/ttf/$FONT_FILE" "$BASE_URL/$FONT_FILE"
        done

    - name: Subset and Convert to WOFF2
      run: |
        cd fonts/ttf
        for file in *.ttf; do
          if [ -f "$file" ] && [ -s "$file" ]; then
            echo "Subsetting and converting $file to WOFF2..."
            # 使用 fonttools 提取常用字，直接输出为 woff2 格式，体积压缩至 5MB 以内
            pyftsubset "$file" \
              --unicodes="U+0000-00FF,U+2000-206F,U+3000-303F,U+4E00-9FA5,U+FF00-FFEF" \
              --flavor=woff2 \
              --output-file="../woff2/${file%.ttf}.woff2"
          fi
        done
        cd ../..

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: subset-woff2-wenkai-lite-${{ env.WENKAI_LITE_VERSION }}
        name: LXGW WenKai Lite Subset WOFF2 (${{ env.WENKAI_LITE_VERSION }})
        body: |
          **精简版 WOFF2 格式字体 (支持 Grimmory)**
          - 采用 Fonttools 子集化处理，体积已严格控制在 5MB 以下。
          - 剔除了生僻字及日文假名，保留了现代中文阅读所需的核心汉字及标点。
        artifacts: "fonts/woff2/*.woff2"
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
